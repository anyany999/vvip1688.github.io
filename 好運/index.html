    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #001529;
            margin: 0;
            padding: 0;
            font-family: -apple-system, system-ui, sans-serif;
            color: #e2e8f0;
            overflow-x: hidden;
        }

        /* 竹林背景 */
        .bamboo-bg {
            position: fixed;
            inset: 0;
            opacity: 0.08;
            pointer-events: none;
            background-image: url("data:image/svg+xml,%3Csvg width='100' height='200' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 200 L30 0 M70 200 L70 0' stroke='%23D4AF37' stroke-width='0.5' fill='none'/%3E%3Cpath d='M30 50 Q45 45 55 55 M70 120 Q55 115 45 125' stroke='%23D4AF37' stroke-width='0.5' fill='none'/%3E%3C/svg%3E");
            z-index: -1;
        }

        .card {
            width: 100%;
            max-width: 480px;
            background: linear-gradient(180deg, #001f3f 0%, #001529 100%);
            border: 2px solid #D4AF37;
            border-radius: 32px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
            overflow: hidden;
            margin: 1rem auto;
            position: relative;
        }

        .tab-btn {
            transition: all 0.3s ease;
            opacity: 0.8;
            filter: grayscale(0.4);
        }

        .tab-btn.active {
            background-color: #D4AF37;
            color: #001f3f;
            opacity: 1;
            filter: grayscale(0);
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.4);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .content-animate {
            animation: fadeIn 0.6s ease-out forwards;
        }

        /* 香火動畫 */
        @keyframes glow {
            0%, 100% { box-shadow: 0 0 8px #ff4d00; opacity: 0.7; }
            50% { box-shadow: 0 0 20px #ff7700; opacity: 1; transform: scale(1.2); }
        }

        @keyframes smoke {
            0% { transform: translate(-50%, 20px) scaleX(1); opacity: 0; }
            20% { opacity: 0.2; }
            100% { transform: translate(-150%, -60px) scaleX(6); opacity: 0; }
        }

        .incense-tip { animation: glow 2s infinite ease-in-out; }
        .smoke { animation: smoke 5s infinite linear; }

        /* 圖片視覺優化樣式 */
        .tab-image {
            width: 100%;
            border-radius: 16px;
            border: 1px solid rgba(212, 175, 55, 0.4);
            margin-top: 14px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            display: block;
        }

        .divider {
            color: rgba(212, 175, 55, 0.3);
            text-align: center;
            font-size: 14px;
            letter-spacing: 0.5em;
            margin: 1rem 0;
        }
    </style>
</head>
